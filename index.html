    <style type="text/tailwindcss">
      @layer base {
        :root {
          --background: 0 0% 100%;
          --foreground: 222.2 84% 4.9%;

          --card: 0 0% 100%;
          --card-foreground: 222.2 84% 4.9%;
 
          --popover: 0 0% 100%;
          --popover-foreground: 222.2 84% 4.9%;
 
          --primary: 210.3 100% 35.1%;
          --primary-foreground: 210 40% 98%;
 
          --secondary: 326.6 100% 45.1%;
          --secondary-foreground: 210 40% 98%;
 
          --muted: 210 40% 96.1%;
          --muted-foreground: 215.4 16.3% 46.9%;
 
          --accent: 210 40% 96.1%;
          --accent-foreground: 222.2 47.4% 11.2%;
 
          --destructive: 0 84.2% 60.2%;
          --destructive-foreground: 210 40% 98%;

          --border: 214.3 31.8% 91.4%;
          --input: 214.3 31.8% 91.4%;
          --ring: 222.2 84% 4.9%;
 
          --radius: 0.5rem;

          /* Colors for AuroraBackground component */
          --white: #ffffff;
          --black: #000000;
          --blue-500: #3b82f6;
          --indigo-300: #a5b4fc;
          --blue-300: #93c5fd;
          --violet-200: #ddd6fe;
          --blue-400: #60a5fa;
          --zinc-50: #f9fafb;
          --zinc-900: #18181b;
          --slate-950: #020617;
        }
 
        .dark {
          --background: 222.2 84% 4.9%;
          --foreground: 210 40% 98%;

          --card: 222.2 84% 4.9%;
          --card-foreground: 210 40% 98%;
 
          --popover: 222.2 84% 4.9%;
          --popover-foreground: 210 40% 98%;
 
          --primary: 210.3 100% 35.1%;
          --primary-foreground: 210 40% 98%;
 
          --secondary: 326.6 100% 45.1%;
          --secondary-foreground: 210 40% 98%;
 
          --muted: 217.2 32.6% 17.5%;
          --muted-foreground: 215 20.2% 65.1%;
 
          --accent: 217.2 32.6% 17.5%;
          --accent-foreground: 210 40% 98%;
 
          --destructive: 0 62.8% 30.6%;
          --destructive-foreground: 210 40% 98%;

          --border: 217.2 32.6% 17.5%;
          --input: 217.2 32.6% 17.5%;
          --ring: 212.7 91.1% 59.8%;
        }
      }
    </style>

    <script>
      tailwind.config = {
        darkMode: "class",
        theme: {
          extend: {
            fontFamily: {
              sans: ['Inter', 'sans-serif'],
              orbitron: ['Orbitron', 'sans-serif'],
            },
            colors: {
                border: 'hsl(var(--border))',
                input: 'hsl(var(--input))',
                ring: 'hsl(var(--ring))',
                background: 'hsl(var(--background))',
                foreground: 'hsl(var(--foreground))',
                primary: {
                  DEFAULT: 'hsl(var(--primary))',
                  foreground: 'hsl(var(--primary-foreground))',
                },
                secondary: {
                  DEFAULT: 'hsl(var(--secondary))',
                  foreground: 'hsl(var(--secondary-foreground))',
                },
                destructive: {
                  DEFAULT: 'hsl(var(--destructive))',
                  foreground: 'hsl(var(--destructive-foreground))',
                },
                muted: {
                  DEFAULT: 'hsl(var(--muted))',
                  foreground: 'hsl(var(--muted-foreground))',
                },
                accent: {
                  DEFAULT: 'hsl(var(--accent))',
                  foreground: 'hsl(var(--accent-foreground))',
                },
                popover: {
                  DEFAULT: 'hsl(var(--popover))',
                  foreground: 'hsl(var(--popover-foreground))',
                },
                card: {
                  DEFAULT: 'hsl(var(--card))',
                  foreground: 'hsl(var(--card-foreground))',
                },
                 // Legacy colors
                'brand-cobalt': '#0047AB',
                'brand-magenta': '#E6007E',
                'brand-charcoal': '#0a0a10',
            },
            borderRadius: {
              lg: `var(--radius)`,
              md: `calc(var(--radius) - 2px)`,
              sm: `calc(var(--radius) - 4px)`,
            },
            backgroundImage: {
              'linear-to-r': 'linear-gradient(to right, hsl(var(--background)), transparent)',
              'linear-to-l': 'linear-gradient(to left, hsl(var(--background)), transparent)',
            },
            backgroundSize: {
              '200%': '200%',
              '4x': '400% 400%',
            },
            backgroundPosition: {
              'pos-0': '0% 0%',
              'pos-100': '100% 0%',
            },
            animation: {
              'fade-in-up': 'fadeInUp 0.8s ease-out forwards',
              'gradient-bg': 'gradient-bg 25s ease infinite',
              'button-glow': 'buttonGlow 4s ease-in-out infinite',
              'float': 'float 15s ease-in-out infinite',
              'shimmer': 'shimmer 1.5s ease-out infinite',
              'infinite-scroll': 'infinite-scroll 50s linear infinite',
              'aurora': 'aurora 60s linear infinite',
            },
            keyframes: {
              fadeInUp: {
                '0%': { opacity: '0', transform: 'translateY(20px)' },
                '100%': { opacity: '1', transform: 'translateY(0)' },
              },
              'gradient-bg': {
                '0%': { backgroundPosition: '0% 50%' },
                '25%': { backgroundPosition: '50% 0%' },
                '50%': { backgroundPosition: '100% 50%' },
                '75%': { backgroundPosition: '50% 100%' },
                '100%': { backgroundPosition: '0% 50%' },
              },
              buttonGlow: {
                '0%': { boxShadow: '0 0 5px hsl(var(--secondary)), 0 0 10px hsl(var(--secondary))' },
                '50%': { boxShadow: '0 0 10px hsl(var(--primary)), 0 0 20px hsl(var(--primary))' },
                '100%': { boxShadow: '0 0 5px hsl(var(--secondary)), 0 0 10px hsl(var(--secondary))' },
              },
              float: {
                '0%, 100%': { transform: 'translate(0px, 0px) rotate(0deg)' },
                '50%': { transform: 'translate(-30px, 20px) rotate(10deg)' },
              },
              shimmer: {
                '100%': { transform: 'translateX(100%)' },
              },
              'infinite-scroll': {
                'from': { transform: 'translateX(0)' },
                'to': { transform: 'translateX(-50%)' },
              },
              aurora: {
                from: {
                  backgroundPosition: "50% 50%, 50% 50%",
                },
                to: {
                  backgroundPosition: "350% 50%, 350% 50%",
                },
              },
            },
          },
        },
      }
    </script>
